services:

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE:      ${MYSQL_DATABASE:-macmonitor}
      MYSQL_USER:          ${MYSQL_USER:-monitor}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD:-monitor123}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root",
             "--password=${MYSQL_ROOT_PASSWORD:-rootpass}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  streamlit:
    build: .
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      # Inside Docker the app reaches MySQL via the service name
      DB_HOST:     mysql
      DB_PORT:     "3306"
      DB_NAME:     ${MYSQL_DATABASE:-macmonitor}
      DB_USER:     ${MYSQL_USER:-monitor}
      DB_PASSWORD: ${MYSQL_PASSWORD:-monitor123}
      # LLM — values come from .env on the host
      LLM_MODEL:        ${LLM_MODEL:-claude-opus-4-5}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      # Live-reload: changes to app/ are visible without rebuilding the image
      - ./app:/app
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
