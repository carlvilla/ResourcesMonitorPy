services:

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE:      ${MYSQL_DATABASE}
      MYSQL_USER:          ${MYSQL_USER}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root",
             "--password=${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  streamlit:
    build: .
    restart: unless-stopped
    ports:
      - "${STREAMLIT_PORT}:${STREAMLIT_PORT}"
      - "${DEBUGPY_PORT}:${DEBUGPY_PORT}"
    environment:
      MYSQL_HOST:     mysql
      MYSQL_PORT:     3306
      MYSQL_NAME:     ${MYSQL_DATABASE}
      MYSQL_USER:     ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      # LLM — values come from .env on the host
      LLM_MODEL:        ${LLM_MODEL}
      LLM_API_KEY:      ${LLM_API_KEY}
      STREAMLIT_SERVER_PORT: ${STREAMLIT_PORT}
      # DEBUG
      DEBUGPY: ${DEBUGPY}
      DEBUGPY_PORT: ${DEBUGPY_PORT}
    volumes:
      # Live-reload: changes to app/ are visible without rebuilding the image
      - ./app:/app
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
